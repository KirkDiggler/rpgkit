name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-linux:
    name: linux (${{ matrix.cxx }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cxx: [clang++, g++]
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang
      - name: Configure
        run: cmake --preset debug
      - name: Build
        run: cmake --build --preset debug
      - name: Test
        run: ctest --preset debug --output-on-failure

  build-windows:
    name: windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DRPGKIT_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-format clang-tidy
      # `make lint` = fmt-check + tidy; tidy depends on configure, which
      # produces build/debug/compile_commands.json for run-clang-tidy —
      # CI enforces exactly what `make pre-commit` does locally.
      - name: Lint
        run: make lint
