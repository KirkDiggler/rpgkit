name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-linux:
    name: linux (${{ matrix.cxx }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cxx: [clang++, g++]
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang
      - name: Configure
        run: cmake --preset debug
      - name: Build
        run: cmake --build --preset debug
      - name: Test
        run: ctest --preset debug --output-on-failure

  build-windows:
    name: windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DRPGKIT_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-format clang-tidy
      # `make lint` = fmt-check + tidy; tidy depends on configure, which
      # produces build/debug/compile_commands.json for run-clang-tidy —
      # CI enforces exactly what `make pre-commit` does locally.
      - name: Lint
        run: make lint

  # Auto-tags AND publishes a GitHub Release when the version in CMakeLists.txt
  # changes and merges to main. Runs only on main pushes (not PRs), after
  # build/test/lint pass — so every release is green-gated. The tag is derived
  # from project(VERSION), so tag <-> version can't drift (no separate check
  # needed). Consumers (rpgkit-ue) pin FetchContent to these tags / Releases.
  # See issue #57.
  tag:
    name: tag release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, lint]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version from CMakeLists.txt
        id: version
        run: |
          version=$(grep -oP 'project\(rpgkit VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          if [ -z "$version" ]; then
            echo "Failed to parse version from CMakeLists.txt" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists on remote
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
      # Publish the Release in the same green-gated job that cut the tag. Only
      # runs when we just created the tag (exists == 'false'), so a no-op main
      # push never re-releases. --verify-tag refuses to invent a tag if the push
      # above somehow didn't land. The GITHUB_TOKEN here can't trigger a further
      # workflow run, which is exactly why this lives in the tag job rather than
      # a separate tag-triggered release.yml.
      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --verify-tag
